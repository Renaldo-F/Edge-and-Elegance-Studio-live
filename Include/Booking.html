<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Appointment | Edge &amp; Elegance</title>
<!-- Bootstrap 5 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <link rel="stylesheet" href="Booking.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Instrument+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>
  <!-- ─── SUCCESS OVERLAY ─── -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-icon">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <polyline points="4,11 9,16 18,6" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <p class="success-title">Appointment Confirmed</p>
    <p class="success-sub">We'll be in touch shortly</p>
    <button type="button" class="success-back" onclick="closeOverlay()">← Make Another Booking</button>
  </div>
 <!-- ═══════════════════════════════════════════
       HEADER — Studio wordmark + Bootstrap nav
  ═══════════════════════════════════════════ -->
  <header>

    <!-- Studio name / wordmark -->
    <h1>Edge <span>&amp;</span> Elegance</h1>

    <!-- Bootstrap responsive navbar -->
    <nav aria-label="Primary navigation"
         class="navbar navbar-expand-lg navbar-dark"
         id="main-nav">

      <!-- Hamburger toggler (visible on mobile) -->
      <button type="button"
              class="navbar-toggler"
              data-bs-toggle="collapse"
              data-bs-target="#navMenu"
              aria-controls="navMenu"
              aria-expanded="false"
              aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Collapsible nav links -->
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-3">
          <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="pricing.html">Pricing</a></li>
          <li class="nav-item"><a class="nav-link" href="reviews.html">Reviews</a></li>
          <li class="nav-item"><a class="nav-link active" href="Booking.html">Booking</a></li>
          <li class="nav-item"><a class="nav-link" href="catalog.html">Catalog</a></li>
          <li class="nav-item"><a class="nav-link" href="FAQ.html">FAQ</a></li>
          <li class="nav-item"><a class="nav-link" href="../Contact/team_member.html">Team</a></li>
        </ul>
      </div>

    </nav>
  </header>
  <!-- ─── MAIN ─── -->
  <main>
    <section class="container">

      <h2>Book Your<br><em>Appointment</em></h2>
      <p class="subhead">Reserve your time with our master craftspeople. Every visit is a refined experience.</p>
      <span class="divider"></span>

      <form id="bookingForm" novalidate>
        <section class="form-grid">

          <!-- Your Name -->
          <section>
            <label for="name">Full Name</label>
            <input id="name" type="text" placeholder="Enter your name" required>
            <small class="error" id="nameError"></small>
          </section>

          <!-- Your Email -->
          <section>
            <label for="email">Email Address</label>
            <input id="email" type="email" placeholder="Enter your email" required>
            <small class="error" id="emailError"></small>
          </section>

          <!-- Your Phonenumber -->
          <section>
            <label for="phone">Phone Number</label>
            <input id="phone" type="tel" placeholder="Enter your phone" required>
            <small class="error" id="phoneError"></small>
          </section>

          <!-- Service -->
          <section>
            <label for="service">Select Service</label>
            <div class="select-wrapper">
              <select id="service" required>
                <option value="">Choose a service</option>
                <option>Barber</option>
                <option>Beard Grooming</option>
                <option>Braiding</option>
                <option>Nail Care</option>
                <option>Hair Treatment</option>
              </select>
            </div>
            <small class="error" id="serviceError"></small>
          </section>

          <!-- this is the Date -->
          <section>
            <label for="date">Select Date</label>
            <input id="date" type="date" required>
            <small class="error" id="dateError"></small>
          </section>

          <!-- this is the Time -->
          <section>
            <label for="time">Select Time</label>
            <input id="time" type="time" required>
            <small class="error" id="timeError"></small>
          </section>

          <!-- this is the Submit -->
          <section class="full">
           <button type="submit">
            <span>Confirm Booking</span>
            <svg class="btn-arrow" viewBox="0 0 16 16" fill="none">
             <path d="M2 8h12M9 4l5 4-5 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
             </svg>
            </button>
          </section>

        </section>
      </form>

    </section>
  </main>


  <footer>
    <p>© 2026 Edge &amp; Elegance Beauty &amp; Barber Studio</p>
  </footer>
 <!-- Bootstrap 5 JS bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="booking.js"></script>
</body>
</html>
